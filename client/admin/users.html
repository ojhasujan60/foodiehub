<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - FoodieHub Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <a href="dashboard.html"><i class="fas fa-utensils"></i> FoodieHub Admin</a>
      </div>
      <ul class="nav-links">
        <li><a href="homepage.html"><i class="fas fa-home"></i> Homepage</a></li>
        <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="users.html" class="active"><i class="fas fa-users"></i> Users</a></li>
        <li><a href="menu.html"><i class="fas fa-pizza-slice"></i> Menu</a></li>
        <li><a href="orders.html"><i class="fas fa-box"></i> Orders</a></li>
        <li><a href="staff.html"><i class="fas fa-user-tie"></i> Staff</a></li>
        <li><a href="tables.html"><i class="fas fa-chair"></i> Tables</a></li>
        <li><a href="reservations.html"><i class="fas fa-calendar-alt"></i> Reservations</a></li>
        <li><a href="reports.html"><i class="fas fa-chart-line"></i> Reports</a></li>
        <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
        <li><a href="../customer/index.html"><i class="fas fa-store"></i> Frontend</a></li>
        <li><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
      <h1><i class="fas fa-users"></i> Manage Users</h1>
      <button id="export-users" class="btn-secondary">
        <i class="fas fa-download"></i> Export CSV
      </button>
    </div>
    
    <!-- Stats -->
    <div class="quick-stats-row">
      <div class="quick-stat-item">
        <span id="total-users-stat">0</span>
        <span>Total Users</span>
      </div>
      <div class="quick-stat-item">
        <span id="active-users-stat">0</span>
        <span>Active Users</span>
      </div>
      <div class="quick-stat-item">
        <span id="new-users-week">0</span>
        <span>New This Week</span>
      </div>
      <div class="quick-stat-item">
        <span id="staff-count-stat">0</span>
        <span>Staff/Admin</span>
      </div>
    </div>
    
    <!-- Filters -->
    <div class="filters">
      <div class="filter-group">
        <label><i class="fas fa-filter"></i> Role</label>
        <select id="role-filter">
          <option value="">All Roles</option>
          <option value="customer">Customers</option>
          <option value="staff">Staff</option>
          <option value="admin">Admins</option>
        </select>
      </div>
      <div class="filter-group">
        <label><i class="fas fa-filter"></i> Status</label>
        <select id="status-filter">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <div class="filter-group">
        <label><i class="fas fa-search"></i> Search</label>
        <input type="text" id="search-input" placeholder="Search by name, email, phone...">
      </div>
    </div>
    
    <!-- Users List -->
    <div id="users-list">
      <div class="loading"><div class="spinner"></div><p>Loading users...</p></div>
    </div>
    
    <!-- Pagination -->
    <div id="pagination-container"></div>
  </div>

  <script type="module" src="../js/admin/users.js"></script>
</body>
</html>
