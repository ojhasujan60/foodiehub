<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Display - FoodieHub Staff</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/staff.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <a href="dashboard.html"><i class="fas fa-utensils"></i> FoodieHub Staff</a>
      </div>
      <ul class="nav-links">
        <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="kitchen.html" class="active"><i class="fas fa-kitchen-set"></i> Kitchen</a></li>
        <li><a href="takeorder.html"><i class="fas fa-pizza-slice"></i> Take Order</a></li>
        <li><a href="reservations.html"><i class="fas fa-calendar-alt"></i> Reservations</a></li>
        <li id="admin-link" style="display: none;"><a href="../admin/dashboard.html"><i class="fas fa-crown"></i> Admin</a></li>
        <li id="user-menu">
          <span><i class="fas fa-user"></i> <span id="user-name"></span></span>
          <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
      <div>
        <h1 style="font-size: 1.8rem; margin-bottom: 0.25rem;"><i class="fas fa-kitchen-set" style="color: #ff6b6b;"></i> Kitchen Display</h1>
        <p style="color: #7f8c8d;">Real-time order management</p>
      </div>
      <div style="display: flex; gap: 0.5rem;">
        <button id="refresh-kitchen" class="btn-secondary" style="background: white; border: 1px solid #ddd; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
        <button id="sound-toggle" class="btn-secondary" style="background: white; border: 1px solid #ddd; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;">
          <i class="fas fa-volume-up"></i> Sound
        </button>
      </div>
    </div>

    <!-- Stats - CLEAN -->
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem;">
      <div class="kitchen-stat-clean">
        <h3 id="pending-count">0</h3>
        <p><i class="fas fa-clock" style="color: #f39c12; margin-right: 0.25rem;"></i> Pending</p>
      </div>
      <div class="kitchen-stat-clean">
        <h3 id="preparing-count">0</h3>
        <p><i class="fas fa-fire" style="color: #3498db; margin-right: 0.25rem;"></i> Preparing</p>
      </div>
      <div class="kitchen-stat-clean">
        <h3 id="ready-count">0</h3>
        <p><i class="fas fa-check-circle" style="color: #27ae60; margin-right: 0.25rem;"></i> Ready</p>
      </div>
      <div class="kitchen-stat-clean">
        <h3 id="total-count">0</h3>
        <p><i class="fas fa-list" style="color: #8e44ad; margin-right: 0.25rem;"></i> Total Active</p>
      </div>
    </div>

    <!-- Filters - CLEAN -->
    <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap;">
      <button class="filter-btn-clean active" data-filter="all"><i class="fas fa-list"></i> All Orders</button>
      <button class="filter-btn-clean" data-filter="dinein"><i class="fas fa-utensils"></i> Dine In</button>
      <button class="filter-btn-clean" data-filter="takeaway"><i class="fas fa-box"></i> Takeaway</button>
      <button class="filter-btn-clean" data-filter="pending"><i class="fas fa-clock"></i> Pending</button>
      <button class="filter-btn-clean" data-filter="preparing"><i class="fas fa-fire"></i> Preparing</button>
      <button class="filter-btn-clean" data-filter="ready"><i class="fas fa-check"></i> Ready</button>
    </div>

    <!-- Orders Container -->
    <div id="kitchen-orders-container">
      <div style="text-align: center; padding: 3rem; background: white; border-radius: 16px;">
        <div class="spinner"></div>
        <p style="color: #7f8c8d; margin-top: 1rem;">Loading orders...</p>
      </div>
    </div>
  </div>

  <audio id="notification-sound" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
  </audio>

  <script type="module" src="../js/staff/kitchen.js"></script>
</body>
</html>
